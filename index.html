<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>madoka Restaurant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{display:none;}
.hero{position:relative;width:100%;height:420px;overflow:hidden;background:#000;}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center 30%;opacity:0.82;}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.15) 0%,rgba(0,0,0,0.65) 100%);}
.hero-add{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.93);color:#111;border:none;padding:10px 18px;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-weight:700;font-family:'Arial',sans-serif;}
.hero-add:hover{background:#C9A84C;color:#fff;}
.hero-body{position:absolute;bottom:28px;left:24px;}
.hero-cap{font-size:9px;letter-spacing:5px;color:rgba(255,255,255,0.6);text-transform:uppercase;margin-bottom:10px;font-family:'Arial',sans-serif;}
.hero-t1{font-size:48px;font-weight:300;color:#fff;line-height:1;font-family:'Georgia',serif;}
.hero-t2{font-size:52px;font-style:italic;color:#C9A84C;font-family:'Georgia',serif;line-height:1.1;}
.main{max-width:800px;margin:0 auto;background:#fff;min-height:100vh;}
.search-wrap{padding:14px 20px 8px;}
.search-input{width:100%;padding:11px 16px;border:1px solid #ddd;font-size:13px;outline:none;color:#333;background:#f9f9f9;letter-spacing:1px;font-family:'Arial',sans-serif;}
.search-input::placeholder{color:#bbb;letter-spacing:2px;}
.filter-bar{padding:0 20px 8px;border-bottom:1px solid #eee;}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding:8px 0;}
.filter-row::-webkit-scrollbar{display:none;}
.fb{padding:7px 14px;border:1px solid #bbb;background:#fff;color:#555;font-size:11px;cursor:pointer;white-space:nowrap;letter-spacing:1px;font-family:'Arial',sans-serif;transition:all 0.15s;border-radius:0;}
.fb.active{background:#111;color:#fff;border-color:#111;}
.fb.special{color:#C9A84C;border-color:#C9A84C;}
.fb.special.active{background:#C9A84C;color:#fff;border-color:#C9A84C;}
.sort-bar{display:flex;align-items:center;gap:10px;padding:8px 20px;border-bottom:1px solid #eee;}
.sort-label{font-size:9px;letter-spacing:3px;color:#aaa;text-transform:uppercase;font-family:'Arial',sans-serif;}
.sort-btn{padding:6px 14px;border:none;background:#fff;color:#999;font-size:11px;cursor:pointer;letter-spacing:1px;font-family:'Arial',sans-serif;border-radius:0;}
.sort-btn.active{background:#111;color:#fff;}
.dish-list{padding:0 20px 100px;}
.dish-card{display:flex;align-items:stretch;border-bottom:1px solid #f0f0f0;cursor:pointer;padding:16px 0;gap:14px;}
.dish-card:hover{opacity:0.7;}
.dish-img{width:80px;height:80px;flex-shrink:0;object-fit:cover;}
.dish-img-ph{width:80px;height:80px;flex-shrink:0;background:#f2f2f2;display:flex;align-items:center;justify-content:center;font-size:28px;color:#ccc;}
.dish-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
.dish-name{font-size:15px;color:#111;font-weight:700;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Arial',sans-serif;}
.dish-genre{font-size:10px;color:#999;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;font-family:'Arial',sans-serif;}
.dish-stars{color:#C9A84C;font-size:13px;letter-spacing:2px;}
.dish-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.dish-tag{font-size:10px;color:#999;border:1px solid #ddd;padding:2px 6px;font-family:'Arial',sans-serif;}
.empty{text-align:center;padding:80px 20px;}
.empty-icon{font-size:40px;color:#ddd;margin-bottom:16px;}
.empty-text{font-size:10px;letter-spacing:4px;color:#bbb;text-transform:uppercase;font-family:'Arial',sans-serif;}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:100;overflow-y:auto;max-width:800px;margin:0 auto;}
.ov-head{position:sticky;top:0;background:#111;color:#fff;padding:16px 20px;display:flex;align-items:center;gap:16px;z-index:10;}
.ov-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;}
.ov-title{font-size:11px;letter-spacing:4px;text-transform:uppercase;font-family:'Arial',sans-serif;flex:1;}
.ov-edit{background:none;border:1px solid rgba(255,255,255,0.4);color:#fff;font-size:10px;letter-spacing:2px;padding:6px 14px;cursor:pointer;font-family:'Arial',sans-serif;}
.ov-hero{width:100%;height:240px;object-fit:cover;}
.ov-body{padding:20px;}
.ov-name{font-size:26px;font-weight:700;color:#111;margin-bottom:4px;font-family:'Georgia',serif;}
.ov-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ov-genre{font-size:10px;letter-spacing:3px;color:#999;text-transform:uppercase;font-family:'Arial',sans-serif;}
.ov-stars{color:#C9A84C;font-size:20px;cursor:pointer;letter-spacing:3px;}
.section-title{font-size:9px;letter-spacing:4px;color:#999;text-transform:uppercase;font-family:'Arial',sans-serif;border-bottom:1px solid #eee;padding-bottom:8px;margin-bottom:12px;}
.ingredient-item{font-size:14px;color:#333;padding:8px 0;border-bottom:1px solid #f5f5f5;font-family:'Arial',sans-serif;}
.step-item{display:flex;gap:14px;margin-bottom:14px;}
.step-num{font-size:11px;color:#C9A84C;letter-spacing:1px;font-weight:700;min-width:24px;padding-top:2px;font-family:'Arial',sans-serif;}
.step-txt{font-size:14px;color:#333;line-height:1.6;font-family:'Arial',sans-serif;}
.note-txt{font-size:14px;color:#666;line-height:1.7;white-space:pre-wrap;font-family:'Arial',sans-serif;}
.del-btn{display:block;width:100%;padding:14px;border:1px solid #ddd;background:#fff;color:#cc3333;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:24px;font-family:'Arial',sans-serif;}
.ov-section{margin-bottom:24px;}
.form-wrap{padding:20px 20px 80px;}
.form-group{margin-bottom:18px;}
.form-label{font-size:9px;letter-spacing:3px;color:#999;text-transform:uppercase;margin-bottom:8px;display:block;font-family:'Arial',sans-serif;}
.form-input{width:100%;padding:11px 14px;border:1px solid #ddd;font-size:14px;outline:none;color:#333;font-family:'Arial',sans-serif;background:#fff;}
.form-input:focus{border-color:#111;}
.form-textarea{width:100%;padding:11px 14px;border:1px solid #ddd;font-size:14px;outline:none;color:#333;font-family:'Arial',sans-serif;resize:vertical;background:#fff;line-height:1.6;}
.form-textarea:focus{border-color:#111;}
.form-select{width:100%;padding:11px 14px;border:1px solid #ddd;font-size:14px;outline:none;color:#333;font-family:'Arial',sans-serif;background:#fff;-webkit-appearance:none;}
.ai-btn{width:100%;padding:13px;border:1px solid #111;background:#111;color:#fff;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-bottom:4px;font-family:'Arial',sans-serif;transition:all 0.2s;}
.ai-btn:hover{background:#C9A84C;border-color:#C9A84C;}
.ai-btn:disabled{background:#ccc;border-color:#ccc;cursor:not-allowed;}
.save-btn{width:100%;padding:14px;border:none;background:#111;color:#fff;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Arial',sans-serif;margin-top:8px;}
.save-btn:hover{background:#C9A84C;}
.photo-btn{width:100%;padding:13px;border:1px solid #ddd;background:#fafafa;color:#999;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:'Arial',sans-serif;}
.photo-preview{position:relative;}
.photo-preview img{width:100%;height:180px;object-fit:cover;}
.photo-del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);color:#fff;border:none;padding:4px 10px;font-size:11px;cursor:pointer;}
</style>
</head>

<script>
const STORAGE_KEY = 'madoka_v3';
function load() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch { return {}; } }
function save(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }

let dishes = load().dishes || [];
let filterTag = 'all';
let filterGenre = 'all';
let sortOrder = 'new';
let searchQ = '';
let editingId = null;
let formPhoto = null;

function saveDishes() { save({ dishes }); }

// Stars
function starsHtml(score, interactive) {
  return [1,2,3,4,5].map(i =>
    `<span style="cursor:${interactive?'pointer':'default'};color:${i<=score?'#C9A84C':'#ddd'};" ${interactive?`onclick="setScore(${i})"`:''}>${i<=score?'★':'☆'}</span>`
  ).join('');
}

// Render home
function render() {
  const q = searchQ.toLowerCase();
  let list = dishes.filter(d => {
    const mQ = !q || d.name.toLowerCase().includes(q) || (d.tags||[]).some(t=>t.toLowerCase().includes(q));
    const mF = filterTag==='all' || (d.tags||[]).includes(filterTag);
    const mG = filterGenre==='all' || d.genre===filterGenre;
    return mQ && mF && mG;
  });
  if (sortOrder==='new') list = list.slice().reverse();

  const el = document.getElementById('dish-list');
  if (list.length===0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🍽</div><div class="empty-text">NO RECIPES YET</div></div>`;
    return;
  }
  el.innerHTML = list.map(d => `
    <div class="dish-card" onclick="openDetail('${d.id}')">
      ${d.photo
        ? `<img class="dish-img" src="${d.photo}" alt=""/>`
        : `<div class="dish-img-ph">🍽</div>`}
      <div class="dish-info">
        <div class="dish-name">${d.name}</div>
        <div class="dish-genre">${d.genre||''}</div>
        <div class="dish-stars">${starsHtml(d.score||0,false)}</div>
        ${(d.tags||[]).length>0?`<div class="dish-tags">${d.tags.slice(0,3).map(t=>`<span class="dish-tag">${t}</span>`).join('')}</div>`:''}
      </div>
    </div>
  `).join('');
}

// Filter buttons
document.getElementById('filter-row').addEventListener('click', e => {
  const btn = e.target.closest('[data-filter]');
  if (!btn) return;
  filterTag = btn.dataset.filter;
  document.querySelectorAll('#filter-row .fb').forEach(b => b.classList.toggle('active', b===btn));
  render();
});
document.getElementById('genre-row').addEventListener('click', e => {
  const btn = e.target.closest('[data-genre]');
  if (!btn) return;
  filterGenre = btn.dataset.genre;
  document.querySelectorAll('#genre-row .fb').forEach(b => b.classList.toggle('active', b===btn));
  render();
});

// Sort
document.getElementById('sort-new').addEventListener('click', () => {
  sortOrder='new';
  document.getElementById('sort-new').classList.add('active');
  document.getElementById('sort-old').classList.remove('active');
  render();
});
document.getElementById('sort-old').addEventListener('click', () => {
  sortOrder='old';
  document.getElementById('sort-old').classList.add('active');
  document.getElementById('sort-new').classList.remove('active');
  render();
});

// Search
document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});

// ADD button
document.getElementById('btn-add').addEventListener('click', () => openForm(null));

// Detail
function openDetail(id) {
  const d = dishes.find(x=>x.id===id);
  if (!d) return;
  editingId = id;
  document.getElementById('detail-title-head').textContent = d.name;
  document.getElementById('detail-name').textContent = d.name;
  document.getElementById('detail-genre').textContent = (d.genre||'').toUpperCase();
  document.getElementById('detail-stars').innerHTML = starsHtml(d.score||0, true);
  const heroEl = document.getElementById('detail-hero');
  if (d.photo) { heroEl.src=d.photo; heroEl.style.display='block'; } else { heroEl.style.display='none'; }
  const tagsEl = document.getElementById('detail-tags');
  tagsEl.innerHTML = (d.tags||[]).map(t=>`<span class="dish-tag">${t}</span>`).join('');
  const ingEl = document.getElementById('detail-ingredients');
  const ingSec = document.getElementById('detail-ing-sec');
  if ((d.ingredients||[]).length>0) {
    ingEl.innerHTML = d.ingredients.map(i=>`<div class="ingredient-item">${i}</div>`).join('');
    ingSec.style.display='block';
  } else { ingSec.style.display='none'; }
  const stepsEl = document.getElementById('detail-steps');
  const stepSec = document.getElementById('detail-step-sec');
  if ((d.steps||[]).length>0) {
    stepsEl.innerHTML = d.steps.map((s,i)=>`<div class="step-item"><span class="step-num">0${i+1}</span><span class="step-txt">${s}</span></div>`).join('');
    stepSec.style.display='block';
  } else { stepSec.style.display='none'; }
  const noteSec = document.getElementById('detail-note-sec');
  if (d.note) { document.getElementById('detail-note').textContent=d.note; noteSec.style.display='block'; } else { noteSec.style.display='none'; }
  show('detail');
}

function setScore(s) {
  const d = dishes.find(x=>x.id===editingId);
  if (!d) return;
  d.score = s;
  saveDishes();
  document.getElementById('detail-stars').innerHTML = starsHtml(s, true);
}

document.getElementById('detail-back').addEventListener('click', () => { show('home'); render(); });
document.getElementById('detail-edit').addEventListener('click', () => {
  const d = dishes.find(x=>x.id===editingId);
  if (d) openForm(d);
});
document.getElementById('detail-delete').addEventListener('click', () => {
  if (!confirm('削除しますか？')) return;
  dishes = dishes.filter(x=>x.id!==editingId);
  saveDishes(); show('home'); render();
});

// Form
function openForm(d) {
  editingId = d ? d.id : null;
  formPhoto = d ? (d.photo||null) : null;
  document.getElementById('form-title-head').textContent = d ? 'EDIT RECIPE' : 'ADD RECIPE';
  document.getElementById('form-name').value = d ? d.name : '';
  document.getElementById('form-genre').value = d ? (d.genre||'和食') : '和食';
  document.getElementById('form-tags').value = d ? (d.tags||[]).join(', ') : '';
  document.getElementById('form-ingredients').value = d ? (d.ingredients||[]).join('\n') : '';
  document.getElementById('form-steps').value = d ? (d.steps||[]).join('\n') : '';
  document.getElementById('form-note').value = d ? (d.note||'') : '';
  renderPhotoArea();
  show('form');
}

function renderPhotoArea() {
  const area = document.getElementById('photo-area');
  if (formPhoto) {
    area.innerHTML = `<div class="photo-preview"><img src="${formPhoto}"/><button class="photo-del" onclick="formPhoto=null;renderPhotoArea()">✕</button></div>`;
  } else {
    area.innerHTML = `<button class="photo-btn" id="photo-btn">📷 ADD PHOTO</button>`;
    document.getElementById('photo-btn').addEventListener('click', () => document.getElementById('photo-input').click());
  }
}

document.getElementById('photo-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { formPhoto = ev.target.result; renderPhotoArea(); };
  reader.readAsDataURL(file);
  e.target.value='';
});

document.getElementById('ai-btn').addEventListener('click', async () => {
  const name = document.getElementById('form-name').value.trim();
  if (!name) { alert('先に料理名を入力してください'); return; }
  const btn = document.getElementById('ai-btn');
  btn.disabled = true; btn.textContent = '⏳ 生成中...';
  try {
    const res = await fetch('/api/recipe', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ dishName: name })
    });
    const r = await res.json();
    if (r.ingredients) document.getElementById('form-ingredients').value = r.ingredients.join('\n');
    if (r.steps) document.getElementById('form-steps').value = r.steps.join('\n');
  } catch(e) {
    alert('AI生成に失敗しました');
  } finally {
    btn.disabled=false; btn.textContent='✦ AI でレシピを生成';
  }
});

document.getElementById('form-save').addEventListener('click', () => {
  const name = document.getElementById('form-name').value.trim();
  if (!name) { alert('料理名を入力してください'); return; }
  const dish = {
    id: editingId || String(Date.now()),
    name,
    genre: document.getElementById('form-genre').value,
    tags: document.getElementById('form-tags').value.split(/[,、]/).map(t=>t.trim()).filter(Boolean),
    ingredients: document.getElementById('form-ingredients').value.split('\n').map(s=>s.trim()).filter(Boolean),
    steps: document.getElementById('form-steps').value.split('\n').map(s=>s.trim()).filter(Boolean),
    note: document.getElementById('form-note').value.trim(),
    photo: formPhoto,
    score: editingId ? (dishes.find(x=>x.id===editingId)||{}).score||0 : 0,
    createdAt: editingId ? (dishes.find(x=>x.id===editingId)||{}).createdAt||new Date().toISOString() : new Date().toISOString(),
  };
  if (editingId) { dishes = dishes.map(x=>x.id===editingId?dish:x); }
  else { dishes.push(dish); }
  saveDishes(); show('home'); render();
});

document.getElementById('form-back').addEventListener('click', () => {
  if (editingId) { show('detail'); openDetail(editingId); }
  else { show('home'); render(); }
});

function show(view) {
  document.getElementById('view-home').style.display = view==='home' ? 'block' : 'none';
  document.getElementById('view-detail').style.display = view==='detail' ? 'block' : 'none';
  document.getElementById('view-form').style.display = view==='form' ? 'block' : 'none';
  window.scrollTo(0,0);
}

render();
</script>
</body>
</html>

x;cursor:pointer;}.loc-btn.on{background:#111;color:#fff;border-color:#111;}.ai-btn{width:100%;padding:13px;border:1px solid #111;background:#111;color:#fff;font-size:11px;letter-spacing:3px;cursor:pointer;margin-bottom:4px;}.sv-btn{width:100%;padding:14px;border:none;background:#111;color:#fff;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:8px;}.sv-btn:hover{background:#C9A84C;}.ph-btn{width:100%;padding:13px;border:1px solid #ddd;background:#fafafa;color:#999;font-size:11px;cursor:pointer;}.ph-prev{position:relative;}.ph-prev img{width:100%;height:180px;object-fit:cover;}.ph-del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);color:#fff;border:none;padding:4px 10px;font-size:11px;cursor:pointer;}
</style></head><body><div class="main"><div id="view-home"><div class="hero"><img src="undefined" alt=""/><div class="hero-ov"></div><button class="hero-add" id="btn-add">+ ADD</button><div class="hero-body"><div class="hero-cap">FAMILY RECIPE BOOK</div><div class="hero-t1">madoka</div><div class="hero-t2">Restaurant</div></div></div><div class="search-wrap"><input class="search-input" id="search-input" placeholder="Search..." type="text"/></div><div class="filter-bar"><div class="filter-row" id="filter-row"><button class="fb active" data-filter="all">All</button><button class="fb special" data-filter="special">* Special</button><button class="fb" data-filter="作りたい">♡ 作りたい</button><button class="fb" data-filter="自宅">自宅</button><button class="fb" data-filter="外食">外食</button></div><div class="filter-row" id="genre-row"><button class="fb active" data-genre="all">All Genre</button><button class="fb" data-genre="和食">和食</button><button class="fb" data-genre="洋食">洋食</button><button class="fb" data-genre="中華">中華</button><button class="fb" data-genre="イタリアン">イタリアン</button><button class="fb" data-genre="アジア">アジア</button><button class="fb" data-genre="カフェ">カフェ</button></div></div><div class="sort-bar"><span class="sort-label">SORT</span><button class="sort-btn active" id="sort-new">新しい順</button><button class="sort-btn" id="sort-old">古い順</button></div><div class="dish-list" id="dish-list"></div></div><div id="view-detail" class="overlay" style="display:none;"><div class="ov-head"><button class="ov-back" id="detail-back">&lt;</button><span class="ov-title" id="detail-title-head"></span><button class="ov-edit" id="detail-edit">EDIT</button></div><img id="detail-hero" class="ov-hero" src="" alt="" style="display:none;"/><div class="ov-body"><div class="ov-name" id="detail-name"></div><div class="ov-meta"><span class="ov-genre" id="detail-genre"></span></div><div class="flag-row"><button class="flag-btn sp-btn" id="flag-special" onclick="tF(1)">* Special</button><button class="flag-btn wt-btn" id="flag-want" onclick="tF(2)">♡ 作りたい</button></div><div class="dish-tags" id="detail-tags" style="margin-bottom:20px;"></div><div class="ov-sec" id="detail-ing-sec"><div class="sec-title">INGREDIENTS</div><div id="detail-ingredients"></div></div><div class="ov-sec" id="detail-step-sec"><div class="sec-title">HOW TO MAKE</div><div id="detail-steps"></div></div><div class="ov-sec" id="detail-note-sec"><div class="sec-title">NOTE</div><div class="note-txt" id="detail-note"></div></div><div class="share-row"><button class="share-btn s-line" id="share-line">LINE</button><button class="share-btn s-x" id="share-x">X</button><button class="share-btn s-copy" id="share-copy">COPY</button></div><button class="del-btn" id="detail-delete">DELETE</button></div></div><div id="view-form" class="overlay" style="display:none;"><div class="ov-head"><button class="ov-back" id="form-back">&lt;</button><span class="ov-title" id="form-title-head">ADD RECIPE</span></div><div class="form-wrap"><div class="fg"><label class="fl">PHOTO</label><div id="photo-area"><button class="ph-btn" id="photo-btn">PHOTO</button></div><input type="file" id="photo-input" accept="image/*" style="display:none;"/></div><div class="fg"><label class="fl">DISH NAME</label><input class="fi" id="form-name" type="text"/></div><div class="fg"><button class="ai-btn" id="ai-btn">AI RECIPE</button></div><div class="fg"><label class="fl">GENRE</label><select class="fs-el" id="form-genre"><option>和食</option><option>洋食</option><option>中華</option><option>イタリアン</option><option>アジア</option><option>カフェ</option><option>その他</option></select></div><div class="fg"><label class="fl">場所</label><div class="loc-row"><button class="loc-btn on" id="loc-home" onclick="sL(1)">自宅</button><button class="loc-btn" id="loc-out" onclick="sL(2)">外食</button></div><div id="store-name-wrap" style="display:none;"><input class="fi" id="form-store" placeholder="店名" type="text" style="margin-top:10px;"/></div></div><div class="fg"><label class="fl">フラグ</label><div class="ff-row"><button class="ff-btn sp-f" id="form-flag-special" onclick="tFF(1)">* Special</button><button class="ff-btn" id="form-flag-want" onclick="tFF(2)">♡ 作りたい</button></div></div><div class="fg"><label class="fl">INGREDIENTS</label><textarea class="ft" id="form-ingredients" rows="4"></textarea></div><div class="fg"><label class="fl">HOW TO MAKE</label><textarea class="ft" id="form-steps" rows="5"></textarea></div><div class="fg"><label class="fl">NOTE</label><textarea class="ft" id="form-note" rows="3"></textarea></div><button class="sv-btn" id="form-save">SAVE</button></div></div></div><script>
var SK="madoka_v4",D=(function(){try{return JSON.parse(localStorage.getItem(SK)||"{}").dishes||[]}catch(e){return[]}}()),fT="all",fG="all",sO="new",sQ="",eI=null,fP=null,fL="自宅",fS=false,fW=false;
function sv(){try{localStorage.setItem(SK,JSON.stringify({dishes:D}))}catch(e){}}
function mf(d){if(fT==="all")return true;if(fT==="special")return d.isSpecial;if(fT==="作りたい")return d.wantTo;if(fT==="自宅")return d.location==="自宅";if(fT==="外食")return d.location==="外食";return true;}
var HT=String.fromCharCode(9825)+" 作りたい";
function render(){var q=sQ.toLowerCase();var list=D.filter(function(d){return(!q||d.name.toLowerCase().includes(q))&&mf(d)&&(fG==="all"||d.genre===fG);});if(sO==="new")list=list.slice().reverse();var el=document.getElementById("dish-list");if(!el)return;if(!list.length){el.innerHTML="<div class='empty'><div class='empty-text'>NO RECIPES YET</div></div>";return;}el.innerHTML=list.map(function(d){var b=[];if(d.isSpecial)b.push("<span class='dish-tag sp-tag'>* Special</span>");if(d.wantTo)b.push("<span class='dish-tag'>"+HT+"</span>");if(d.location)b.push("<span class='dish-tag'>"+d.location+(d.storeName?" / "+d.storeName:"")+"</span>");return "<div class='dish-card' onclick='oD(""+d.id+"")'>"+( d.photo?"<img class='dish-img' src='"+d.photo+"' alt=''/>":"<div class='dish-img-ph'>NO IMG</div>")+"<div class='dish-info'><div class='dish-name'>"+d.name+"</div><div class='dish-genre'>"+(d.genre||"")+"</div>"+(b.length?"<div class='dish-tags'>"+b.join("")+"</div>":"")+"</div></div>";}).join("");}
function show(v){document.getElementById("view-home").style.display=v==="home"?"block":"none";document.getElementById("view-detail").style.display=v==="detail"?"block":"none";document.getElementById("view-form").style.display=v==="form"?"block":"none";window.scrollTo(0,0);}
function oD(id){var d=D.find(function(x){return x.id===id;});if(!d)return;eI=id;document.getElementById("detail-title-head").textContent=d.name;document.getElementById("detail-name").textContent=d.name;var m=(d.genre||"").toUpperCase();if(d.location)m+="  |  "+d.location+(d.storeName?" / "+d.storeName:"");document.getElementById("detail-genre").textContent=m;var h=document.getElementById("detail-hero");if(d.photo){h.src=d.photo;h.style.display="block";}else{h.style.display="none";}document.getElementById("flag-special").classList.toggle("on",!!d.isSpecial);document.getElementById("flag-want").classList.toggle("on",!!d.wantTo);document.getElementById("detail-tags").innerHTML=(d.tags||[]).map(function(t){return "<span class='dish-tag'>"+t+"</span>";}).join("");var is=document.getElementById("detail-ing-sec");if((d.ingredients||[]).length){document.getElementById("detail-ingredients").innerHTML=d.ingredients.map(function(i){return "<div class='ing-item'>"+i+"</div>";}).join("");is.style.display="block";}else{is.style.display="none";}var ss=document.getElementById("detail-step-sec");if((d.steps||[]).length){document.getElementById("detail-steps").innerHTML=d.steps.map(function(s,i){return "<div class='step-item'><span class='step-num'>"+String(i+1).padStart(2,"0")+"</span><span class='step-txt'>"+s+"</span></div>";}).join("");ss.style.display="block";}else{ss.style.display="none";}var ns=document.getElementById("detail-note-sec");if(d.note){document.getElementById("detail-note").textContent=d.note;ns.style.display="block";}else{ns.style.display="none";}show("detail");}
function tF(n){var d=D.find(function(x){return x.id===eI;});if(!d)return;if(n===1)d.isSpecial=!d.isSpecial;if(n===2)d.wantTo=!d.wantTo;sv();document.getElementById("flag-special").classList.toggle("on",!!d.isSpecial);document.getElementById("flag-want").classList.toggle("on",!!d.wantTo);render();}
function sL(n){fL=n===1?"自宅":"外食";document.getElementById("loc-home").classList.toggle("on",n===1);document.getElementById("loc-out").classList.toggle("on",n===2);document.getElementById("store-name-wrap").style.display=n===2?"block":"none";}
function tFF(n){if(n===1){fS=!fS;document.getElementById("form-flag-special").classList.toggle("on",fS);}if(n===2){fW=!fW;document.getElementById("form-flag-want").classList.toggle("on",fW);}}
function rpa(){var area=document.getElementById("photo-area");if(fP){area.innerHTML="<div class='ph-prev'><img src='"+fP+"'/><button class='ph-del' onclick='fP=null;rpa()'>&times;</button></div>";}else{area.innerHTML="<button class='ph-btn' id='photo-btn'>PHOTO</button>";document.getElementById("photo-btn").addEventListener("click",function(){document.getElementById("photo-input").click();});}}
function openForm(d){eI=d?d.id:null;fP=d?d.photo||null:null;fL=d?d.location||"自宅":"自宅";fS=d?!!d.isSpecial:false;fW=d?!!d.wantTo:false;document.getElementById("form-title-head").textContent=d?"EDIT RECIPE":"ADD RECIPE";document.getElementById("form-name").value=d?d.name:"";document.getElementById("form-genre").value=d?d.genre||"和食":"和食";document.getElementById("form-store").value=d?d.storeName||"":"";document.getElementById("form-ingredients").value=d?d.ingredients.join("
"):"";document.getElementById("form-steps").value=d?d.steps.join("
"):"";document.getElementById("form-note").value=d?d.note||"":"";sL(fL==="自宅"?1:2);document.getElementById("form-flag-special").classList.toggle("on",fS);document.getElementById("form-flag-want").classList.toggle("on",fW);rpa();show("form");}
document.getElementById("filter-row").addEventListener("click",function(e){var btn=e.target.closest("[data-filter]");if(!btn)return;fT=btn.dataset.filter;document.querySelectorAll("#filter-row .fb").forEach(function(b){b.classList.toggle("active",b===btn);});render();});
document.getElementById("genre-row").addEventListener("click",function(e){var btn=e.target.closest("[data-genre]");if(!btn)return;fG=btn.dataset.genre;document.querySelectorAll("#genre-row .fb").forEach(function(b){b.classList.toggle("active",b===btn);});render();});

document.getElementById("share-x").addEventListener("click",function(){var d=D.find(function(x){return x.id===eI;});if(!d)return;window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(d.name)+"&url="+encodeURIComponent(location.href),"_blank");});
document.getElementById("share-copy").addEventListener("click",function(){var d=D.find(function(x){return x.id===eI;});if(!d)return;navigator.clipboard.writeText(d.name+"

document.getElementById("photo-input").addEventListener("change",function(e){var file=e.target.files[0];if(!file)return;var r=new FileReader();r.onload=function(ev){fP=ev.target.result;rpa();};r.readAsDataURL(file);e.target.value="";});

");if(r.steps)document.getElementById("form-steps").value=r.steps.join("
");}catch(e){}finally{btn.disabled=false;btn.textContent="AI RECIPE";}});
document.getElementById("form-save").addEventListener("click",function(){var name=document.getElementById("form-name").value.trim();if(!name)return;var dish={id:eI||String(Date.now()),name:name,genre:document.getElementById("form-genre").value,location:fL,storeName:fL==="外食"?document.getElementById("form-store").value.trim():"",isSpecial:fS,wantTo:fW,tags:[],ingredients:document.getElementById("form-ingredients").value.split("
").map(function(s){return s.trim();}).filter(Boolean),steps:document.getElementById("form-steps").value.split("
").map(function(s){return s.trim();}).filter(Boolean),note:document.getElementById("form-note").value.trim(),photo:fP,createdAt:eI?(D.find(function(x){return x.id===eI;})||{}).createdAt||new Date().toISOString():new Date().toISOString()};if(eI){D=D.map(function(x){return x.id===eI?dish:x;});}else{D.push(dish);}sv();show("home");render();});
document.getElementById("form-back").addEventListener("click",function(){if(eI){show("detail");oD(eI);}else{show("home");render();}});
render();

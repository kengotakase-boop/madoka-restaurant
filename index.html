<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>madoka Restaurant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff;font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{display:none;}
.hero{position:relative;width:100%;height:420px;overflow:hidden;background:#000;}
.hero img{width:100%;height:100%;object-fit:cover;opacity:0.82;display:block;}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15),rgba(0,0,0,.65));}
.hero-add{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.93);color:#111;border:none;padding:10px 18px;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-weight:700;}
.hero-body{position:absolute;bottom:28px;left:24px;}
.hero-cap{font-size:9px;letter-spacing:5px;color:rgba(255,255,255,.6);text-transform:uppercase;margin-bottom:10px;}
.hero-t1{font-size:48px;font-weight:300;color:#fff;line-height:1;font-family:Georgia,serif;}
.hero-t2{font-size:52px;font-style:italic;color:#C9A84C;font-family:Georgia,serif;line-height:1.1;}
.main{max-width:800px;margin:0 auto;background:#fff;min-height:100vh;}
.search-wrap{padding:14px 20px 8px;}
.search-input{width:100%;padding:11px 16px;border:1px solid #ddd;font-size:13px;outline:none;color:#333;background:#f9f9f9;}
.filter-bar{padding:0 20px 8px;border-bottom:1px solid #eee;}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding:8px 0;}
.fb{padding:7px 14px;border:1px solid #bbb;background:#fff;color:#555;font-size:11px;cursor:pointer;white-space:nowrap;}
.fb.active{background:#111;color:#fff;border-color:#111;}
.fb.special{color:#C9A84C;border-color:#C9A84C;}
.fb.special.active{background:#C9A84C;color:#fff;}
.sort-bar{display:flex;align-items:center;gap:10px;padding:8px 20px;border-bottom:1px solid #eee;}
.sort-label{font-size:9px;letter-spacing:3px;color:#aaa;text-transform:uppercase;}
.sort-btn{padding:6px 14px;border:none;background:#fff;color:#999;font-size:11px;cursor:pointer;}
.sort-btn.active{background:#111;color:#fff;}
.dish-list{padding:8px 20px 80px;}
.dish-card{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid #eee;cursor:pointer;}
.dish-thumb{width:64px;height:64px;object-fit:cover;flex-shrink:0;background:#eee;}
.dish-thumb-empty{width:64px;height:64px;flex-shrink:0;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:22px;}
.dish-info{flex:1;min-width:0;}
.dish-name{font-size:14px;font-weight:600;color:#111;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dish-meta{font-size:11px;color:#888;display:flex;gap:8px;align-items:center;}
.dish-tag{padding:2px 7px;font-size:10px;border:1px solid #ddd;color:#777;}
.dish-tag.special{border-color:#C9A84C;color:#C9A84C;}
.dish-tag.want{border-color:#4a90d9;color:#4a90d9;}
.dish-note{font-size:11px;color:#aaa;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.empty-state{text-align:center;padding:60px 20px;color:#bbb;font-size:13px;}
.loading{text-align:center;padding:60px 20px;color:#bbb;font-size:13px;}
#view-form{display:none;position:fixed;inset:0;background:#fff;z-index:100;overflow-y:auto;}
.form-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;z-index:10;}
.form-back{background:none;border:none;font-size:22px;cursor:pointer;color:#333;}
.form-title{font-size:15px;font-weight:700;letter-spacing:1px;}
.form-body{padding:20px;}
.form-section{margin-bottom:20px;}
.form-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#888;display:block;margin-bottom:8px;}
.form-input{width:100%;padding:12px 14px;border:1px solid #ddd;font-size:13px;outline:none;background:#fafafa;color:#111;}
.form-textarea{width:100%;padding:12px 14px;border:1px solid #ddd;font-size:13px;outline:none;background:#fafafa;resize:vertical;min-height:80px;color:#111;}
.form-row{display:flex;gap:12px;}
.form-row .form-section{flex:1;}
.form-select{width:100%;padding:12px 14px;border:1px solid #ddd;font-size:13px;outline:none;background:#fafafa;color:#111;appearance:none;}
.special-toggle{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid #ddd;background:#fafafa;cursor:pointer;}
.special-toggle.on{border-color:#C9A84C;background:#fffbf0;}
.special-label{font-size:13px;color:#555;}
.want-toggle{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid #ddd;background:#fafafa;cursor:pointer;margin-top:8px;}
.want-toggle.on{border-color:#4a90d9;background:#f0f6ff;}
.want-label{font-size:13px;color:#555;}
.store-wrap{margin-top:8px;display:none;}
.store-wrap.show{display:block;}
.photo-btn{width:100%;padding:14px;border:2px dashed #ddd;background:#fafafa;font-size:12px;color:#888;cursor:pointer;text-align:center;}
.photo-preview{width:100%;max-height:200px;object-fit:cover;display:none;}
.ai-btn{width:100%;padding:14px;background:#111;color:#fff;border:none;font-size:12px;letter-spacing:2px;cursor:pointer;margin-bottom:12px;}
.ai-btn:disabled{background:#aaa;}
.ai-result{background:#f9f9f9;border:1px solid #eee;padding:14px;font-size:12px;color:#555;line-height:1.7;display:none;margin-bottom:12px;white-space:pre-wrap;}
.save-btn{width:100%;padding:16px;background:#111;color:#fff;border:none;font-size:12px;letter-spacing:3px;cursor:pointer;}
.delete-btn{width:100%;padding:14px;background:#fff;color:#cc3333;border:1px solid #cc3333;font-size:12px;cursor:pointer;margin-top:10px;}
#view-detail{display:none;position:fixed;inset:0;background:#fff;z-index:100;overflow-y:auto;}
.detail-hero{position:relative;width:100%;height:260px;background:#111;}
.detail-hero img{width:100%;height:100%;object-fit:cover;opacity:.85;}
.detail-hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.7));}
.detail-back{position:absolute;top:16px;left:16px;background:rgba(0,0,0,.4);color:#fff;border:none;font-size:20px;cursor:pointer;padding:6px 10px;}
.detail-edit{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.4);color:#fff;border:none;font-size:11px;cursor:pointer;padding:8px 14px;}
.detail-tag-wrap{position:absolute;bottom:16px;left:16px;display:flex;gap:6px;}
.detail-badge{padding:4px 10px;font-size:10px;border:1px solid rgba(255,255,255,.6);color:#fff;}
.detail-badge.special{border-color:#C9A84C;color:#C9A84C;}
.detail-badge.want{border-color:#4a90d9;color:#4a90d9;}
.detail-body{padding:20px;}
.detail-name{font-size:26px;font-weight:700;color:#111;margin-bottom:8px;font-family:Georgia,serif;}
.detail-meta{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.detail-meta-item{font-size:11px;color:#888;}
.detail-section{margin-bottom:18px;}
.detail-section-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#aaa;margin-bottom:10px;}
.detail-note{font-size:13px;color:#555;line-height:1.7;white-space:pre-wrap;}
.detail-recipe-box{background:#f9f9f9;border:1px solid #eee;padding:16px;font-size:12px;color:#555;line-height:1.8;white-space:pre-wrap;}
.share-row{display:flex;gap:8px;margin-top:16px;}
.share-btn{flex:1;padding:12px 8px;border:1px solid #ddd;background:#fff;font-size:11px;color:#555;cursor:pointer;text-align:center;}
.share-btn.line{border-color:#06C755;color:#06C755;}
.share-btn.x{border-color:#000;color:#000;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:12px 24px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="main">
  <div class="hero" id="heroWrap">
    <img id="heroImg" src="" alt="" style="display:none"/>
    <div class="hero-ov"></div>
    <button class="hero-add" onclick="openForm(null)">+ ADD DISH</button>
    <div class="hero-body">
      <div class="hero-cap">Our Family Cookbook</div>
      <div class="hero-t1">madoka</div>
      <div class="hero-t2">Restaurant</div>
    </div>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="料理名で検索..." oninput="render()"/>
  </div>
  <div class="filter-bar">
    <div class="filter-row" id="filterRow"></div>
  </div>
  <div class="sort-bar">
    <span class="sort-label">Sort</span>
    <button class="sort-btn active" id="sortNew" onclick="setSort('new')">新しい順</button>
    <button class="sort-btn" id="sortName" onclick="setSort('name')">名前順</button>
  </div>
  <div class="dish-list" id="dishList"></div>
</div>

<!-- Form View -->
<div id="view-form">
  <div class="form-header">
    <button class="form-back" onclick="closeForm()">&#8592;</button>
    <span class="form-title" id="formTitle">NEW DISH</span>
  </div>
  <div class="form-body">
    <div class="form-section">
      <label class="form-label">料理名</label>
      <input class="form-input" id="fName" type="text" placeholder="例: 肉じゃが"/>
    </div>
    <div class="form-row">
      <div class="form-section">
        <label class="form-label">カテゴリ</label>
        <select class="form-select" id="fCat">
          <option value="\u548c\u98df">\u548c\u98df</option>
          <option value="\u6d0b\u98df">\u6d0b\u98df</option>
          <option value="\u4e2d\u83ef">\u4e2d\u83ef</option>
          <option value="\u30a4\u30bf\u30ea\u30a2\u30f3">\u30a4\u30bf\u30ea\u30a2\u30f3</option>
          <option value="\u305d\u306e\u4ed6">\u305d\u306e\u4ed6</option>
        </select>
      </div>
      <div class="form-section">
        <label class="form-label">場所</label>
        <select class="form-select" id="fLocation" onchange="onLocationChange()">
          <option value="\u81ea\u5b85">\u81ea\u5b85</option>
          <option value="\u5916\u98df">\u5916\u98df</option>
        </select>
      </div>
    </div>
    <div class="store-wrap" id="storeWrap">
      <div class="form-section">
        <label class="form-label">お店の名前</label>
        <input class="form-input" id="fStore" type="text" placeholder="例: \u4e38\u4e43\u5185 \u6c60\u888b\u5e97"/>
      </div>
    </div>
    <div class="form-section">
      <div class="special-toggle" id="specialToggle" onclick="toggleSpecial()">
        <span id="specialIcon">&#9734;</span>
        <span class="special-label" id="specialLabel">Special\u306b\u3059\u308b</span>
      </div>
      <div class="want-toggle" id="wantToggle" onclick="toggleWant()">
        <span id="wantIcon">&#9651;</span>
        <span class="want-label" id="wantLabel">\u4f5c\u308a\u305f\u3044\u30ea\u30b9\u30c8\u306b\u8ffd\u52a0</span>
      </div>
    </div>
    <div class="form-section">
      <label class="form-label">\u30e1\u30e2</label>
      <textarea class="form-textarea" id="fNote" placeholder="\u5473\u306e\u5370\u8c61\u3001\u306a\u305c\u3053\u306e\u6599\u7406\u306a\u3069..."></textarea>
    </div>
    <div class="form-section">
      <label class="form-label">\u5199\u771f</label>
      <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="onPhotoChange()"/>
      <img class="photo-preview" id="photoPreview"/>
      <button class="photo-btn" onclick="document.getElementById('photoInput').click()">\ud83d\udcf8 \u5199\u771f\u3092\u9078\u629e</button>
    </div>
    <div class="form-section">
      <label class="form-label">AI\u30ec\u30b7\u30d4</label>
      <button class="ai-btn" id="aiBtn" onclick="genRecipe()">\u2728 AI\u3067\u30ec\u30b7\u30d4\u3092\u751f\u6210</button>
      <div class="ai-result" id="aiResult"></div>
    </div>
    <div class="form-section">
      <button class="save-btn" onclick="saveDish()">\u4fdd\u5b58</button>
      <button class="delete-btn" id="deleteBtn" style="display:none" onclick="deleteDish()">\u524a\u9664</button>
    </div>
  </div>
</div>

<!-- Detail View -->
<div id="view-detail">
  <div class="detail-hero" id="detailHero">
    <img id="detailImg" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;opacity:.85;"/>
    <div class="detail-hero-ov"></div>
    <button class="detail-back" onclick="closeDetail()">&#8592;</button>
    <button class="detail-edit" onclick="editCurrent()">\u7de8\u96c6</button>
    <div class="detail-tag-wrap" id="detailTagWrap"></div>
  </div>
  <div class="detail-body">
    <div class="detail-name" id="detailName"></div>
    <div class="detail-meta" id="detailMeta"></div>
    <div class="detail-section" id="detailNoteSection">
      <div class="detail-section-title">MEMO</div>
      <div class="detail-note" id="detailNote"></div>
    </div>
    <div class="detail-section" id="detailRecipeSection" style="display:none">
      <div class="detail-section-title">RECIPE</div>
      <div class="detail-recipe-box" id="detailRecipe"></div>
    </div>
    <div class="share-row">
      <button class="share-btn line" onclick="shareToLine()">\ud83d\udcac LINE</button>
      <button class="share-btn x" onclick="shareToX()">&#10005; X</button>
      <button class="share-btn" onclick="copyShare()">\ud83d\udccb \u30b3\u30d4\u30fc</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== State =====
var dishes = [];
var currentDish = null;
var editId = null;
var isSpecial = false;
var isWant = false;
var photoData = null;
var currentRecipe = null;
var currentSort = 'new';
var currentFilter = 'all';
var heroImage = null;

var CATS = ['\u548c\u98df','\u6d0b\u98df','\u4e2d\u83ef','\u30a4\u30bf\u30ea\u30a2\u30f3','\u305d\u306e\u4ed6'];

// ===== Server Storage =====
async function dishesLoad() {
  try {
    var res = await fetch('/api/dishes');
    if (!res.ok) throw new Error('fetch failed');
    dishes = await res.json();
    if (!Array.isArray(dishes)) dishes = [];
  } catch(e) {
    dishes = [];
  }
  render();
}

async function dishesSave() {
  try {
    await fetch('/api/dishes', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(dishes)
    });
  } catch(e) {
    showToast('\u4fdd\u5b58\u306b\u5931\u6557\u3057\u307e\u3057\u305f');
  }
}

// ===== Hero =====
async function heroLoad() {
  try {
    var res = await fetch('/api/hero');
    var data = await res.json();
    if (data.image) {
      heroImage = data.image;
      var img = document.getElementById('heroImg');
      img.src = data.image;
      img.style.display = 'block';
    }
  } catch(e) {}
}

// ===== Init =====
window.addEventListener('DOMContentLoaded', function() {
  heroLoad();
  dishesLoad();
  buildFilters();
});

// ===== Filters =====
function buildFilters() {
  var row = document.getElementById('filterRow');
  var btns = [
    {key:'all', label:'\u3059\u3079\u3066'},
    {key:'special', label:'\u2605 Special', cls:'special'},
    {key:'want', label:'\u4f5c\u308a\u305f\u3044'}
  ];
  CATS.forEach(function(c){ btns.push({key:c, label:c}); });
  row.innerHTML = '';
  btns.forEach(function(b) {
    var btn = document.createElement('button');
    btn.className = 'fb' + (b.cls ? ' '+b.cls : '') + (currentFilter===b.key ? ' active' : '');
    btn.textContent = b.label;
    btn.onclick = function(){ currentFilter = b.key; buildFilters(); render(); };
    row.appendChild(btn);
  });
}

function setSort(s) {
  currentSort = s;
  document.getElementById('sortNew').className = 'sort-btn' + (s==='new'?' active':'');
  document.getElementById('sortName').className = 'sort-btn' + (s==='name'?' active':'');
  render();
}

// ===== Render =====
function render() {
  var q = (document.getElementById('searchInput').value||'').trim().toLowerCase();
  var list = dishes.filter(function(d) {
    if (currentFilter==='special' && !d.special) return false;
    if (currentFilter==='want' && !d.want) return false;
    if (CATS.indexOf(currentFilter)>=0 && d.category!==currentFilter) return false;
    if (q && d.name.toLowerCase().indexOf(q)<0) return false;
    return true;
  });
  if (currentSort==='name') {
    list.sort(function(a,b){ return a.name.localeCompare(b.name,'ja'); });
  } else {
    list.sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });
  }
  var el = document.getElementById('dishList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state">\u6599\u7406\u304c\u307e\u3060\u767b\u9332\u3055\u308c\u3066\u3044\u307e\u305b\u3093</div>';
    return;
  }
  el.innerHTML = list.map(function(d) {
    var thumb = d.photo
      ? '<img class="dish-thumb" src="'+d.photo+'" alt=""/>'
      : '<div class="dish-thumb-empty">'+(d.special?'\u2605':'\ud83c\udf7d\ufe0f')+'</div>';
    var tags = '';
    if (d.special) tags += '<span class="dish-tag special">Special</span>';
    if (d.want) tags += '<span class="dish-tag want">\u4f5c\u308a\u305f\u3044</span>';
    tags += '<span class="dish-tag">'+esc(d.category)+'</span>';
    if (d.location==='\u5916\u98df' && d.store) tags += '<span class="dish-tag">'+esc(d.store)+'</span>';
    var note = d.note ? '<div class="dish-note">'+esc(d.note)+'</div>' : '';
    return '<div class="dish-card" onclick="openDetail(\''+d.id+'\')">' +thumb+'<div class="dish-info"><div class="dish-name">'+esc(d.name)+'</div><div class="dish-meta">'+tags+'</div>'+note+'</div></div>';
  }).join('');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== Form =====
function openForm(id) {
  editId = id;
  isSpecial = false;
  isWant = false;
  photoData = null;
  currentRecipe = null;
  document.getElementById('fName').value = '';
  document.getElementById('fCat').value = '\u548c\u98df';
  document.getElementById('fLocation').value = '\u81ea\u5b85';
  document.getElementById('storeWrap').className = 'store-wrap';
  document.getElementById('fStore').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('aiResult').style.display = 'none';
  document.getElementById('aiResult').textContent = '';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('formTitle').textContent = 'NEW DISH';
  updateSpecialUI();
  updateWantUI();

  if (id) {
    var d = dishes.find(function(x){ return x.id===id; });
    if (d) {
      document.getElementById('fName').value = d.name||'';
      document.getElementById('fCat').value = d.category||'\u548c\u98df';
      document.getElementById('fLocation').value = d.location||'\u81ea\u5b85';
      if (d.location==='\u5916\u98df') document.getElementById('storeWrap').className = 'store-wrap show';
      document.getElementById('fStore').value = d.store||'';
      document.getElementById('fNote').value = d.note||'';
      isSpecial = !!d.special;
      isWant = !!d.want;
      photoData = d.photo||null;
      currentRecipe = d.recipe||null;
      if (photoData) {
        document.getElementById('photoPreview').src = photoData;
        document.getElementById('photoPreview').style.display = 'block';
      }
      if (currentRecipe) {
        document.getElementById('aiResult').textContent = formatRecipe(currentRecipe);
        document.getElementById('aiResult').style.display = 'block';
      }
      updateSpecialUI();
      updateWantUI();
      document.getElementById('deleteBtn').style.display = 'block';
      document.getElementById('formTitle').textContent = 'EDIT DISH';
    }
  }
  document.getElementById('view-form').style.display = 'block';
  window.scrollTo(0,0);
}

function closeForm() {
  document.getElementById('view-form').style.display = 'none';
}

function onLocationChange() {
  var loc = document.getElementById('fLocation').value;
  document.getElementById('storeWrap').className = 'store-wrap' + (loc==='\u5916\u98df'?' show':'');
}

function toggleSpecial() {
  isSpecial = !isSpecial;
  updateSpecialUI();
}
function updateSpecialUI() {
  var t = document.getElementById('specialToggle');
  var icon = document.getElementById('specialIcon');
  var label = document.getElementById('specialLabel');
  t.className = 'special-toggle' + (isSpecial?' on':'');
  icon.textContent = isSpecial ? '\u2605' : '\u2606';
  label.textContent = isSpecial ? 'Special\u89e3\u9664' : 'Special\u306b\u3059\u308b';
}

function toggleWant() {
  isWant = !isWant;
  updateWantUI();
}
function updateWantUI() {
  var t = document.getElementById('wantToggle');
  var icon = document.getElementById('wantIcon');
  var label = document.getElementById('wantLabel');
  t.className = 'want-toggle' + (isWant?' on':'');
  icon.textContent = isWant ? '\u25bc' : '\u25b3';
  label.textContent = isWant ? '\u4f5c\u308a\u305f\u3044\u30ea\u30b9\u30c8\u304b\u3089\u524a\u9664' : '\u4f5c\u308a\u305f\u3044\u30ea\u30b9\u30c8\u306b\u8ffd\u52a0';
}

function onPhotoChange() {
  var file = document.getElementById('photoInput').files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    photoData = e.target.result;
    var preview = document.getElementById('photoPreview');
    preview.src = photoData;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function genRecipe() {
  var name = document.getElementById('fName').value.trim();
  if (!name) { showToast('\u6599\u7406\u540d\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044'); return; }
  var btn = document.getElementById('aiBtn');
  btn.disabled = true;
  btn.textContent = '\u751f\u6210\u4e2d...';
  try {
    var res = await fetch('/api/recipe', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({dishName:name})
    });
    var recipe = await res.json();
    currentRecipe = recipe;
    var el = document.getElementById('aiResult');
    el.textContent = formatRecipe(recipe);
    el.style.display = 'block';
  } catch(e) {
    showToast('\u30ec\u30b7\u30d4\u306e\u53d6\u5f97\u306b\u5931\u6557\u3057\u307e\u3057\u305f');
  }
  btn.disabled = false;
  btn.textContent = '\u2728 AI\u3067\u30ec\u30b7\u30d4\u3092\u518d\u751f\u6210';
}

function formatRecipe(r) {
  if (!r) return '';
  var lines = [];
  if (r.ingredients && r.ingredients.length) {
    lines.push('[\u6750\u6599]');
    r.ingredients.forEach(function(i){ lines.push('\u30fb '+i); });
    lines.push('');
  }
  if (r.steps && r.steps.length) {
    lines.push('[\u624b\u9806]');
    r.steps.forEach(function(s,i){ lines.push((i+1)+'. '+s); });
  }
  return lines.join('\n');
}

async function saveDish() {
  var name = document.getElementById('fName').value.trim();
  if (!name) { showToast('\u6599\u7406\u540d\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044'); return; }
  var d = {
    id: editId || ('d' + Date.now()),
    name: name,
    category: document.getElementById('fCat').value,
    location: document.getElementById('fLocation').value,
    store: document.getElementById('fStore').value.trim(),
    note: document.getElementById('fNote').value.trim(),
    special: isSpecial,
    want: isWant,
    photo: photoData,
    recipe: currentRecipe,
    createdAt: editId ? (dishes.find(function(x){return x.id===editId;})||{}).createdAt || Date.now() : Date.now()
  };
  if (editId) {
    var idx = dishes.findIndex(function(x){ return x.id===editId; });
    if (idx>=0) dishes[idx] = d; else dishes.push(d);
  } else {
    dishes.push(d);
  }
  await dishesSave();
  render();
  closeForm();
  showToast('\u4fdd\u5b58\u3057\u307e\u3057\u305f\u2713');
}

async function deleteDish() {
  if (!editId) return;
  if (!confirm('\u524a\u9664\u3057\u307e\u3059\u304b\uff1f')) return;
  dishes = dishes.filter(function(x){ return x.id!==editId; });
  await dishesSave();
  render();
  closeForm();
  showToast('\u524a\u9664\u3057\u307e\u3057\u305f');
}

// ===== Detail =====
function openDetail(id) {
  var d = dishes.find(function(x){ return x.id===id; });
  if (!d) return;
  currentDish = d;
  document.getElementById('detailName').textContent = d.name;
  var img = document.getElementById('detailImg');
  if (d.photo) { img.src = d.photo; img.style.display = 'block'; }
  else { img.style.display = 'none'; }
  var tagWrap = document.getElementById('detailTagWrap');
  var tags = '';
  if (d.special) tags += '<span class="detail-badge special">Special</span>';
  if (d.want) tags += '<span class="detail-badge want">\u4f5c\u308a\u305f\u3044</span>';
  tags += '<span class="detail-badge">'+esc(d.category)+'</span>';
  tagWrap.innerHTML = tags;
  var meta = '<span class="detail-meta-item">'+esc(d.category)+'</span>';
  if (d.location) meta += '<span class="detail-meta-item">'+esc(d.location)+'</span>';
  if (d.location==='\u5916\u98df' && d.store) meta += '<span class="detail-meta-item">'+esc(d.store)+'</span>';
  document.getElementById('detailMeta').innerHTML = meta;
  var noteEl = document.getElementById('detailNote');
  var noteSection = document.getElementById('detailNoteSection');
  if (d.note) { noteEl.textContent = d.note; noteSection.style.display = 'block'; }
  else { noteSection.style.display = 'none'; }
  var recipeSection = document.getElementById('detailRecipeSection');
  if (d.recipe) {
    document.getElementById('detailRecipe').textContent = formatRecipe(d.recipe);
    recipeSection.style.display = 'block';
  } else {
    recipeSection.style.display = 'none';
  }
  document.getElementById('view-detail').style.display = 'block';
  window.scrollTo(0,0);
}

function closeDetail() {
  document.getElementById('view-detail').style.display = 'none';
  currentDish = null;
}

function editCurrent() {
  if (!currentDish) return;
  closeDetail();
  openForm(currentDish.id);
}

// ===== Share =====
function shareText() {
  if (!currentDish) return '';
  var t = 'madoka Restaurant\n\u300c'+currentDish.name+'\u300d';
  if (currentDish.special) t += ' \u2605Special';
  if (currentDish.note) t += '\n\n'+currentDish.note;
  return t;
}
function shareToLine() {
  var url = 'https://line.me/R/msg/text/?'+encodeURIComponent(shareText());
  window.open(url,'_blank');
}
function shareToX() {
  var url = 'https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText());
  window.open(url,'_blank');
}
function copyShare() {
  navigator.clipboard.writeText(shareText()).then(function(){ showToast('\u30b3\u30d4\u30fc\u3057\u307e\u3057\u305f'); }).catch(function(){ showToast('\u30b3\u30d4\u30fc\u306b\u5931\u6557\u3057\u307e\u3057\u305f'); });
}

// ===== Toast =====
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(function(){ t.className = 'toast'; }, 2000);
}
</script>

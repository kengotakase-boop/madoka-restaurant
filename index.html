<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>madoka Restaurant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{display:none;}
.hero{position:relative;width:100%;height:420px;overflow:hidden;background:#000;}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center 30%;opacity:0.82;}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.15) 0%,rgba(0,0,0,0.65) 100%);}
.hero-add{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.93);color:#111;border:none;padding:10px 18px;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-weight:700;}
.hero-add:hover{background:#C9A84C;color:#fff;}
.hero-body{position:absolute;bottom:28px;left:24px;}
.hero-cap{font-size:9px;letter-spacing:5px;color:rgba(255,255,255,0.6);text-transform:uppercase;margin-bottom:10px;}
.hero-t1{font-size:48px;font-weight:300;color:#fff;line-height:1;font-family:Georgia,serif;}
.hero-t2{font-size:52px;font-style:italic;color:#C9A84C;font-family:Georgia,serif;line-height:1.1;}
.main{max-width:800px;margin:0 auto;background:#fff;min-height:100vh;}
.search-wrap{padding:14px 20px 8px;}
.search-input{width:100%;padding:11px 16px;border:1px solid #ddd;font-size:13px;outline:none;color:#333;background:#f9f9f9;}
.search-input::placeholder{color:#bbb;letter-spacing:2px;}
.filter-bar{padding:0 20px 8px;border-bottom:1px solid #eee;}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding:8px 0;}
.fb{padding:7px 14px;border:1px solid #bbb;background:#fff;color:#555;font-size:11px;cursor:pointer;white-space:nowrap;letter-spacing:1px;transition:all 0.15s;border-radius:0;}
.fb.active{background:#111;color:#fff;border-color:#111;}
.fb.special{color:#C9A84C;border-color:#C9A84C;}
.fb.special.active{background:#C9A84C;color:#fff;}
.sort-bar{display:flex;align-items:center;gap:10px;padding:8px 20px;border-bottom:1px solid #eee;}
.sort-label{font-size:9px;letter-spacing:3px;color:#aaa;text-transform:uppercase;}
.sort-btn{padding:6px 14px;border:none;background:#fff;color:#999;font-size:11px;cursor:pointer;border-radius:0;}
.sort-btn.active{background:#111;color:#fff;}
.dish-list{padding:0 20px 100px;}
.dish-card{display:flex;align-items:stretch;border-bottom:1px solid #f0f0f0;cursor:pointer;padding:16px 0;gap:14px;}
.dish-card:hover{opacity:0.7;}
.dish-img{width:80px;height:80px;flex-shrink:0;object-fit:cover;}
.dish-img-ph{width:80px;height:80px;flex-shrink:0;background:#f2f2f2;display:flex;align-items:center;justify-content:center;font-size:28px;color:#ccc;}
.dish-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
.dish-name{font-size:15px;color:#111;font-weight:700;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dish-genre{font-size:10px;color:#999;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.dish-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.dish-tag{font-size:10px;color:#999;border:1px solid #ddd;padding:2px 6px;}
.dish-tag.special-tag{color:#C9A84C;border-color:#C9A84C;}
.empty{text-align:center;padding:80px 20px;}
.empty-icon{font-size:40px;color:#ddd;margin-bottom:16px;}
.empty-text{font-size:10px;letter-spacing:4px;color:#bbb;text-transform:uppercase;}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:100;overflow-y:auto;max-width:800px;margin:0 auto;}
.ov-head{position:sticky;top:0;background:#111;color:#fff;padding:16px 20px;display:flex;align-items:center;gap:16px;z-index:10;}
.ov-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;}
.ov-title{font-size:11px;letter-spacing:4px;text-transform:uppercase;flex:1;}
.ov-edit{background:none;border:1px solid rgba(255,255,255,0.4);color:#fff;font-size:10px;letter-spacing:2px;padding:6px 14px;cursor:pointer;}
.ov-hero{width:100%;height:240px;object-fit:cover;}
.ov-body{padding:20px;}
.ov-name{font-size:26px;font-weight:700;color:#111;margin-bottom:8px;font-family:Georgia,serif;}
.ov-meta{margin-bottom:12px;}
.ov-genre{font-size:10px;letter-spacing:3px;color:#999;text-transform:uppercase;}
.flag-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.flag-btn{padding:8px 18px;border:1px solid #ddd;background:#fff;color:#888;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all 0.15s;}
.flag-btn.special-btn{border-color:#C9A84C;color:#C9A84C;}
.flag-btn.special-btn.on{background:#C9A84C;color:#fff;}
.flag-btn.want-btn.on{background:#111;color:#fff;border-color:#111;}
.share-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.share-btn{padding:10px 16px;border:none;font-size:11px;letter-spacing:1px;cursor:pointer;font-weight:700;}
.share-line{background:#06C755;color:#fff;}
.share-copy{background:#f0f0f0;color:#333;}
.share-x{background:#000;color:#fff;}
.section-title{font-size:9px;letter-spacing:4px;color:#999;text-transform:uppercase;border-bottom:1px solid #eee;padding-bottom:8px;margin-bottom:12px;}
.ingredient-item{font-size:14px;color:#333;padding:8px 0;border-bottom:1px solid #f5f5f5;}
.step-item{display:flex;gap:14px;margin-bottom:14px;}
.step-num{font-size:11px;color:#C9A84C;letter-spacing:1px;font-weight:700;min-width:24px;padding-top:2px;}
.step-txt{font-size:14px;color:#333;line-height:1.6;}
.note-txt{font-size:14px;color:#666;line-height:1.7;white-space:pre-wrap;}
.del-btn{display:block;width:100%;padding:14px;border:1px solid #ddd;background:#fff;color:#cc3333;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:24px;}
.ov-section{margin-bottom:24px;}
.form-wrap{padding:20px 20px 80px;}
.form-group{margin-bottom:18px;}
.form-label{font-size:9px;letter-spacing:3px;color:#999;text-transform:uppercase;margin-bottom:8px;display:block;}
.form-input{width:100%;padding:11px 14px;border:1px solid #ddd;font-size:14px;outline:none;color:#333;background:#fff;}
.form-input:focus{border-color:#111;}
.form-textarea{width:100%;padding:11px 14px;border:1px solid #ddd;font-size:14px;outline:none;color:#333;resize:vertical;background:#fff;line-height:1.6;}
.form-textarea:focus{border-color:#111;}
.form-select{width:100%;padding:11px 14px;border:1px solid #ddd;font-size:14px;outline:none;color:#333;background:#fff;-webkit-appearance:none;}
.form-flag-row{display:flex;gap:10px;flex-wrap:wrap;}
.form-flag-btn{padding:9px 18px;border:1px solid #ddd;background:#fff;color:#888;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all 0.15s;}
.form-flag-btn.on{background:#111;color:#fff;border-color:#111;}
.form-flag-btn.special-f.on{background:#C9A84C;color:#fff;border-color:#C9A84C;}
.location-row{display:flex;gap:10px;}
.loc-btn{flex:1;padding:10px;border:1px solid #ddd;background:#fff;color:#888;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all 0.15s;}
.loc-btn.on{background:#111;color:#fff;border-color:#111;}
.ai-btn{width:100%;padding:13px;border:1px solid #111;background:#111;color:#fff;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-bottom:4px;transition:all 0.2s;}
.ai-btn:hover{background:#C9A84C;border-color:#C9A84C;}
.ai-btn:disabled{background:#ccc;border-color:#ccc;cursor:not-allowed;}
.save-btn{width:100%;padding:14px;border:none;background:#111;color:#fff;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:8px;}
.save-btn:hover{background:#C9A84C;}
.photo-btn{width:100%;padding:13px;border:1px solid #ddd;background:#fafafa;color:#999;font-size:11px;letter-spacing:2px;cursor:pointer;}
.photo-preview{position:relative;}
.photo-preview img{width:100%;height:180px;object-fit:cover;}
.photo-del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);color:#fff;border:none;padding:4px 10px;font-size:11px;cursor:pointer;}
</style>
</head>
<body>
<div class="main">
<div id="view-home">
<div class="hero">
<img src="PHOTO_PLACEHOLDER" alt="madoka"/>
<div class="hero-ov"></div>
<button class="hero-add" id="btn-add">+ ADD</button>
<div class="hero-body">
<div class="hero-cap">FAMILY RECIPE BOOK</div>
<div class="hero-t1">madoka</div>
<div class="hero-t2">Restaurant</div>
</div>
</div>
<div class="search-wrap"><input class="search-input" id="search-input" placeholder="Search..." type="text"/></div>
<div class="filter-bar">
<div class="filter-row" id="filter-row">
<button class="fb active" data-filter="all">All</button>
<button class="fb special" data-filter="special">❆ Special</button>
<button class="fb" data-filter="作りたい">♡ 作りたい</button>
<button class="fb" data-filter="自宅">自宅</button>
<button class="fb" data-filter="外食">外食</button>
</div>
<div class="filter-row" id="genre-row">
<button class="fb active" data-genre="all">All Genre</button>
<button class="fb" data-genre="和食">和食</button>
<button class="fb" data-genre="洋食">洋食</button>
<button class="fb" data-genre="中華">中華</button>
<button class="fb" data-genre="イタリアン">イタリアン</button>
<button class="fb" data-genre="アジア">アジア</button>
<button class="fb" data-genre="カフェ">カフェ</button>
</div>
</div>
<div class="sort-bar">
<span class="sort-label">SORT</span>
<button class="sort-btn active" id="sort-new">新しい順</button>
<button class="sort-btn" id="sort-old">古い順</button>
</div>
<div class="dish-list" id="dish-list"></div>
</div>
<div id="view-detail" class="overlay" style="display:none;">
<div class="ov-head">
<button class="ov-back" id="detail-back">←</button>
<span class="ov-title" id="detail-title-head"></span>
<button class="ov-edit" id="detail-edit">EDIT</button>
</div>
<img id="detail-hero" class="ov-hero" src="" alt="" style="display:none;"/>
<div class="ov-body">
<div class="ov-name" id="detail-name"></div>
<div class="ov-meta"><span class="ov-genre" id="detail-genre"></span></div>
<div class="flag-row">
<button class="flag-btn special-btn" id="flag-special" onclick="toggleFlag('special')">❆ Special</button>
<button class="flag-btn want-btn" id="flag-want" onclick="toggleFlag('作りたい')">♡ 作りたい</button>
</div>
<div class="dish-tags" id="detail-tags" style="margin-bottom:20px;"></div>
<div class="ov-section" id="detail-ing-sec"><div class="section-title">INGREDIENTS</div><div id="detail-ingredients"></div></div>
<div class="ov-section" id="detail-step-sec"><div class="section-title">HOW TO MAKE</div><div id="detail-steps"></div></div>
<div class="ov-section" id="detail-note-sec"><div class="section-title">NOTE</div><div class="note-txt" id="detail-note"></div></div>
<div class="share-row">
<button class="share-btn share-line" id="share-line">LINE でシェア</button>
<button class="share-btn share-x" id="share-x">X (Twitter)</button>
<button class="share-btn share-copy" id="share-copy">リンクをコピー</button>
</div>
<button class="del-btn" id="detail-delete">DELETE RECIPE</button>
</div>
</div>
<div id="view-form" class="overlay" style="display:none;">
<div class="ov-head">
<button class="ov-back" id="form-back">←</button>
<span class="ov-title" id="form-title-head">ADD RECIPE</span>
</div>
<div class="form-wrap">
<div class="form-group"><label class="form-label">PHOTO</label><div id="photo-area"><button class="photo-btn" id="photo-btn">📷 ADD PHOTO</button></div><input type="file" id="photo-input" accept="image/*" style="display:none;"/></div>
<div class="form-group"><label class="form-label">DISH NAME *</label><input class="form-input" id="form-name" placeholder="例：唐揚げ" type="text"/></div>
<div class="form-group"><button class="ai-btn" id="ai-btn">❆ AI でレシピを生成</button></div>
<div class="form-group"><label class="form-label">GENRE</label><select class="form-select" id="form-genre"><option>和食</option><option>洋食</option><option>中華</option><option>イタリアン</option><option>アジア</option><option>カフェ</option><option>その他</option></select></div>
<div class="form-group"><label class="form-label">場所</label><div class="location-row"><button class="loc-btn on" id="loc-home" onclick="setLocation('自宅')">🏠 自宅</button><button class="loc-btn" id="loc-out" onclick="setLocation('外食')">🍽 外食</button></div><div id="store-name-wrap" style="display:none;"><input class="form-input" id="form-store" placeholder="店名を入力" type="text" style="margin-top:10px;"/></div></div>
<div class="form-group"><label class="form-label">フラグ</label><div class="form-flag-row"><button class="form-flag-btn special-f" id="form-flag-special" onclick="toggleFormFlag('special')">❆ Special</button><button class="form-flag-btn" id="form-flag-want" onclick="toggleFormFlag('作りたい')">♡ 作りたい</button></div></div>
<div class="form-group"><label class="form-label">INGREDIENTS</label><textarea class="form-textarea" id="form-ingredients" rows="4" placeholder="例：鶏もも肉 300g"></textarea></div>
<div class="form-group"><label class="form-label">HOW TO MAKE</label><textarea class="form-textarea" id="form-steps" rows="5" placeholder="例：鶏肉を切る"></textarea></div>
<div class="form-group"><label class="form-label">NOTE</label><textarea class="form-textarea" id="form-note" rows="3" placeholder="コツ・メモなど"></textarea></div>
<button class="save-btn" id="form-save">SAVE</button>
</div>
</div>
</div>
<script>
const STORAGE_KEY='madoka_v4';
function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch{return{}}}
function save(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch{}}
function migrate(){const old=localStorage.getItem('madoka_v3');if(old&&!localStorage.getItem(STORAGE_KEY)){try{const data=JSON.parse(old);if(data.dishes){data.dishes=data.dishes.map(d=>{const tags=d.tags||[];return{...d,isSpecial:tags.includes('Special')||d.isSpecial||false,wantTo:tags.includes('作りたい')||d.wantTo||false,location:tags.includes('外食')?'外食':'自宅',tags:tags.filter(t=>!['作りたい','自宅','外食','Special','special'].includes(t))};});save(data);}}catch(e){}}}
migrate();
let dishes=load().dishes||[],filterTag='all',filterGenre='all',sortOrder='new',searchQ='',editingId=null,formPhoto=null,formLocation='自宅',formFlagSpecial=false,formFlagWant=false;
function saveDishes(){save({dishes});}
function matchFilter(d){if(filterTag==='all')return true;if(filterTag==='special')return d.isSpecial;if(filterTag==='作りたい')return d.wantTo;if(filterTag==='自宅')return d.location==='自宅';if(filterTag==='外食')return d.location==='外食';return true;}
function render(){const q=searchQ.toLowerCase();let list=dishes.filter(d=>(!q||d.name.toLowerCase().includes(q))&&matchFilter(d)&&(filterGenre==='all'||d.genre===filterGenre));if(sortOrder==='new')list=list.slice().reverse();const el=document.getElementById('dish-list');if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">🍽</div><div class="empty-text">NO RECIPES YET</div></div>';return;}el.innerHTML=list.map(d=>{const b=[];if(d.isSpecial)b.push('<span class="dish-tag special-tag">❆ Special</span>');if(d.wantTo)b.push('<span class="dish-tag">♡ 作りたい</span>');if(d.location)b.push('<span class="dish-tag">'+d.location+(d.storeName?' / '+d.storeName:'')+'</span>');return '<div class="dish-card" onclick="openDetail(\''+d.id+'\')">'+( d.photo?'<img class="dish-img" src="'+d.photo+'" alt=""/>'  :'<div class="dish-img-ph">🍽</div>')+'<div class="dish-info"><div class="dish-name">'+d.name+'</div><div class="dish-genre">'+(d.genre||'')+'</div>'+(b.length?'<div class="dish-tags">'+b.join('')+'</div>':'')+'</div></div>';}).join('');}
document.getElementById('filter-row').addEventListener('click',e=>{const btn=e.target.closest('[data-filter]');if(!btn)return;filterTag=btn.dataset.filter;document.querySelectorAll('#filter-row .fb').forEach(b=>b.classList.toggle('active',b===btn));render();});
document.getElementById('genre-row').addEventListener('click',e=>{const btn=e.target.closest('[data-genre]');if(!btn)return;filterGenre=btn.dataset.genre;document.querySelectorAll('#genre-row .fb').forEach(b=>b.classList.toggle('active',b===btn));render();});
document.getElementById('sort-new').addEventListener('click',()=>{sortOrder='new';document.getElementById('sort-new').classList.add('active');document.getElementById('sort-old').classList.remove('active');render();});
document.getElementById('sort-old').addEventListener('click',()=>{sortOrder='old';document.getElementById('sort-old').classList.add('active');document.getElementById('sort-new').classList.remove('active');render();});
document.getElementById('search-input').addEventListener('input',e=>{searchQ=e.target.value;render();});
document.getElementById('btn-add').addEventListener('click',()=>openForm(null));
function openDetail(id){const d=dishes.find(x=>x.id===id);if(!d)return;editingId=id;document.getElementById('detail-title-head').textContent=d.name;document.getElementById('detail-name').textContent=d.name;let m=(d.genre||'').toUpperCase();if(d.location)m+='  |  '+d.location+(d.storeName?' / '+d.storeName:'');document.getElementById('detail-genre').textContent=m;const h=document.getElementById('detail-hero');if(d.photo){h.src=d.photo;h.style.display='block';}else{h.style.display='none';}updateFlagButtons(d);document.getElementById('detail-tags').innerHTML=(d.tags||[]).map(t=>'<span class="dish-tag">'+t+'</span>').join('');const is=document.getElementById('detail-ing-sec');if((d.ingredients||[]).length){document.getElementById('detail-ingredients').innerHTML=d.ingredients.map(i=>'<div class="ingredient-item">'+i+'</div>').join('');is.style.display='block';}else{is.style.display='none';}const ss=document.getElementById('detail-step-sec');if((d.steps||[]).length){document.getElementById('detail-steps').innerHTML=d.steps.map((s,i)=>'<div class="step-item"><span class="step-num">'+String(i+1).padStart(2,'0')+'</span><span class="step-txt">'+s+'</span></div>').join('');ss.style.display='block';}else{ss.style.display='none';}const ns=document.getElementById('detail-note-sec');if(d.note){document.getElementById('detail-note').textContent=d.note;ns.style.display='block';}else{ns.style.display='none';}show('detail');}
function updateFlagButtons(d){document.getElementById('flag-special').classList.toggle('on',!!d.isSpecial);document.getElementById('flag-want').classList.toggle('on',!!d.wantTo);}
function toggleFlag(flag){const d=dishes.find(x=>x.id===editingId);if(!d)return;if(flag==='special')d.isSpecial=!d.isSpecial;if(flag==='作りたい')d.wantTo=!d.wantTo;saveDishes();updateFlagButtons(d);render();}
document.getElementById('detail-back').addEventListener('click',()=>{show('home');render();});
document.getElementById('detail-edit').addEventListener('click',()=>{const d=dishes.find(x=>x.id===editingId);if(d)openForm(d);});
document.getElementById('detail-delete').addEventListener('click',()=>{if(!confirm('削除しますか？'))return;dishes=dishes.filter(x=>x.id!==editingId);saveDishes();show('home');render();});
document.getElementById('share-line').addEventListener('click',()=>{const d=dishes.find(x=>x.id===editingId);if(!d)return;window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(location.href)+'&text='+encodeURIComponent('「'+d.name+'」'),'_blank');});
document.getElementById('share-x').addEventListener('click',()=>{const d=dishes.find(x=>x.id===editingId);if(!d)return;window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('「'+d.name+'」 #madokaRestaurant')+'&url='+encodeURIComponent(location.href),'_blank');});
document.getElementById('share-copy').addEventListener('click',()=>{const d=dishes.find(x=>x.id===editingId);if(!d)return;navigator.clipboard.writeText('「'+d.name+'」
'+location.href).then(()=>{const b=document.getElementById('share-copy');const o=b.textContent;b.textContent='コピーしました！';setTimeout(()=>b.textContent=o,2000);});});
function setLocation(loc){formLocation=loc;document.getElementById('loc-home').classList.toggle('on',loc==='自宅');document.getElementById('loc-out').classList.toggle('on',loc==='外食');document.getElementById('store-name-wrap').style.display=loc==='外食'?'block':'none';}
function toggleFormFlag(flag){if(flag==='special'){formFlagSpecial=!formFlagSpecial;document.getElementById('form-flag-special').classList.toggle('on',formFlagSpecial);}if(flag==='作りたい'){formFlagWant=!formFlagWant;document.getElementById('form-flag-want').classList.toggle('on',formFlagWant);}}
function openForm(d){editingId=d?d.id:null;formPhoto=d?(d.photo||null):null;formLocation=d?(d.location||'自宅'):'自宅';formFlagSpecial=d?(!!d.isSpecial):false;formFlagWant=d?(!!d.wantTo):false;document.getElementById('form-title-head').textContent=d?'EDIT RECIPE':'ADD RECIPE';document.getElementById('form-name').value=d?d.name:'';document.getElementById('form-genre').value=d?(d.genre||'和食'):'和食';document.getElementById('form-store').value=d?(d.storeName||''):'';document.getElementById('form-ingredients').value=d?(d.ingredients||[]).join('\n'):'';document.getElementById('form-steps').value=d?(d.steps||[]).join('\n'):'';document.getElementById('form-note').value=d?(d.note||''):'';setLocation(formLocation);document.getElementById('form-flag-special').classList.toggle('on',formFlagSpecial);document.getElementById('form-flag-want').classList.toggle('on',formFlagWant);renderPhotoArea();show('form');}
function renderPhotoArea(){const area=document.getElementById('photo-area');if(formPhoto){area.innerHTML='<div class="photo-preview"><img src="'+formPhoto+'"/><button class="photo-del" onclick="formPhoto=null;renderPhotoArea()">✕</button></div>';}else{area.innerHTML='<button class="photo-btn" id="photo-btn">📷 ADD PHOTO</button>';document.getElementById('photo-btn').addEventListener('click',()=>document.getElementById('photo-input').click());}}
document.getElementById('photo-input').addEventListener('change',e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{formPhoto=ev.target.result;renderPhotoArea();};r.readAsDataURL(file);e.target.value='';});
document.getElementById('ai-btn').addEventListener('click',async()=>{const name=document.getElementById('form-name').value.trim();if(!name){alert('先に料理名を入力してください');return;}const btn=document.getElementById('ai-btn');btn.disabled=true;btn.textContent='⏳ 生成中...';try{const res=await fetch('/api/recipe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dishName:name})});const r=await res.json();if(r.ingredients)document.getElementById('form-ingredients').value=r.ingredients.join('\n');if(r.steps)document.getElementById('form-steps').value=r.steps.join('\n');}catch(e){alert('AI生成に失敗しました');}finally{btn.disabled=false;btn.textContent='❆ AI でレシピを生成';}})
document.getElementById('form-save').addEventListener('click',()=>{const name=document.getElementById('form-name').value.trim();if(!name){alert('料理名を入力してください');return;}const dish={id:editingId||String(Date.now()),name,genre:document.getElementById('form-genre').value,location:formLocation,storeName:formLocation==='外食'?document.getElementById('form-store').value.trim():'',isSpecial:formFlagSpecial,wantTo:formFlagWant,tags:[],ingredients:document.getElementById('form-ingredients').value.split('\n').map(s=>s.trim()).filter(Boolean),steps:document.getElementById('form-steps').value.split('\n').map(s=>s.trim()).filter(Boolean),note:document.getElementById('form-note').value.trim(),photo:formPhoto,createdAt:editingId?(dishes.find(x=>x.id===editingId)||{}).createdAt||new Date().toISOString():new Date().toISOString()};if(editingId){dishes=dishes.map(x=>x.id===editingId?dish:x);}else{dishes.push(dish);}saveDishes();show('home');render();});
document.getElementById('form-back').addEventListener('click',()=>{if(editingId){show('detail');openDetail(editingId);}else{show('home');render();}});
function show(v){document.getElementById('view-home').style.display=v==='home'?'block':'none';document.getElementById('view-detail').style.display=v==='detail'?'block':'none';document.getElementById('view-form').style.display=v==='form'?'block':'none';window.scrollTo(0,0);}
render();
</script>
</body>
</html>
